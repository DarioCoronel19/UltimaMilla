<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Capacitación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="app-title">Guía de Capacitación</h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                    <i class="fas fa-sun"></i>
                    <i class="fas fa-moon"></i>
                </button>
                <div class="mode-toggle">
                    <span class="mode-label">Guía</span>
                    <label class="switch">
                        <input type="checkbox" id="modeSwitch">
                        <span class="slider"></span>
                    </label>
                    <span class="mode-label">Libre</span>
                </div>
            <div class="progress-container" id="progressContainer">
                <button class="progress-toggle" id="progressToggle" title="Ocultar/Mostrar progreso">
                    <i class="fas fa-chevron-up"></i>
                </button>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                <span class="progress-text" id="progressText">0% - Paso 1 de 8</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar Navigation -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>Pasos del Proceso</h3>
                </div>
                <nav class="steps-nav" id="stepsNav">
                    <!-- Steps will be generated by JS -->
                </nav>
                <div class="sidebar-footer">
                    <button class="btn-reset" id="resetBtn">
                        <i class="fas fa-redo"></i> Reiniciar Progreso
                    </button>
                </div>
            </aside>

            <!-- Content Panel -->
            <section class="content-panel" id="contentPanel">
                <div class="step-content" id="stepContent">
                    <!-- Content will be loaded by JS -->
                </div>
                <div class="content-actions">
                    <button class="btn btn-secondary" id="prevBtn">
                        <i class="fas fa-arrow-left"></i> Anterior
                    </button>
                    <button class="btn btn-primary" id="nextBtn">
                        Siguiente <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </section>
        </main>

        <!-- Mobile Navigation -->
        <nav class="mobile-nav" id="mobileNav">
            <button class="mobile-nav-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
                <span>Menú</span>
            </button>
            <button class="mobile-nav-btn" id="mobileContentBtn">
                <i class="fas fa-book"></i>
                <span>Contenido</span>
            </button>
        </nav>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Guía de Capacitación - Módulo Última Milla</p>
            <span class="version">v1.0</span>
        </footer>

        <!-- Completion Modal -->
        <div class="completion-modal" id="completionModal">
            <div class="completion-overlay"></div>
            <div class="completion-content">
                <div class="completion-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <h2>¡Felicidades!</h2>
                <p>Has completado todos los pasos de la guía de capacitación.</p>
                <div class="completion-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="completedSteps">8</span>
                        <span class="stat-label">Pasos completados</span>
                    </div>
                <button class="btn btn-primary" id="completionCloseBtn">
                    <i class="fas fa-check"></i> Finalizar
                </button>
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
